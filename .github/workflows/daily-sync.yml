name: Daily Cotton Data Sync
on:
  schedule:
    - cron: '45 12 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Fetch cotton market data
        run: node fetchers.js
      - name: Commit live feed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add live-data.json
          git diff --cached --quiet || git commit -m "daily cotton data sync"
          git push
